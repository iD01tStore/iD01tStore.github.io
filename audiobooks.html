<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUDIO_ARCHIVE // DJ iD01t - 270+ Audiobooks</title>
    <meta name="description" content="DJ iD01t - Official Audio Archive // 270+ Technical and Creative Audiobooks by Guillaume Lessard & iD01t Productions">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔊</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-cyan: #00ff9f;
            --primary-green: #00ff41;
            --dark-bg: #0a0e1a;
            --darker-bg: #050810;
            --electric-blue: #00d4ff;
            --glitch-pink: #ff0080;
            --text-light: #e0fff0;
            --border-cyan: #00d9a3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto Mono', 'Courier New', monospace;
            background: var(--darker-bg);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 159, 0.03) 0px,
                transparent 1px,
                transparent 2px,
                rgba(0, 255, 159, 0.03) 3px
            );
            pointer-events: none;
            z-index: 9999;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(0); }
            100% { transform: translateY(100px); }
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--primary-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 159, 0.3);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-cyan);
            text-decoration: none;
            text-shadow: 0 0 10px var(--primary-cyan);
            font-family: 'Share Tech Mono', monospace;
        }

        .nav-links {
            display: flex; gap: 2rem; list-style: none;
        }

        .nav-links a {
            color: var(--text-light); text-decoration: none; font-size: 0.9rem; transition: all 0.3s;
        }

        .nav-links a.active {
            color: var(--primary-cyan); text-shadow: 0 0 10px var(--primary-cyan);
        }

        .main-content {
            padding: 8rem 2rem 4rem; max-width: 1400px; margin: 0 auto; position: relative; z-index: 2;
        }

        .page-title {
            font-size: 4rem; color: var(--primary-cyan); text-transform: uppercase; margin-bottom: 1rem;
            text-shadow: 0 0 20px var(--primary-cyan); font-family: 'Share Tech Mono', monospace; text-align: center;
        }

        .archive-stats {
            text-align: center; color: var(--primary-green); margin-bottom: 3rem; font-size: 0.9rem;
        }

        .search-filter-section {
            background: rgba(10, 14, 26, 0.9); border: 2px solid var(--border-cyan); padding: 2rem;
            margin-bottom: 3rem; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem;
        }

        .search-box {
            display: flex; flex-direction: column;
        }

        .search-box label {
            color: var(--primary-cyan); margin-bottom: 0.5rem; font-size: 0.8rem; text-transform: uppercase;
        }

        .search-box input, .search-box select {
            background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-cyan); color: var(--text-light);
            padding: 0.8rem; font-family: 'Roboto Mono', monospace; font-size: 0.9rem;
        }

        .audio-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; margin: 4rem 0;
        }

        .audio-card {
            background: rgba(10, 14, 26, 0.9); border: 2px solid var(--border-cyan); padding: 1.5rem;
            transition: all 0.3s; position: relative; overflow: hidden; display: flex; flex-direction: column;
        }

        .audio-card:hover {
            border-color: var(--primary-cyan); box-shadow: 0 0 30px rgba(0, 255, 159, 0.3);
        }

        .audio-title {
            font-size: 1.1rem; color: var(--primary-cyan); margin-bottom: 0.5rem;
            font-family: 'Share Tech Mono', monospace; line-height: 1.4;
        }

        .audio-author {
            color: var(--electric-blue); font-size: 0.8rem; margin-bottom: 1rem;
        }

        .player-ui {
            background: rgba(0, 0, 0, 0.5); padding: 1rem; border: 1px solid rgba(0, 255, 159, 0.3); margin-bottom: 1.5rem;
        }

        .progress-bar {
            height: 4px; background: rgba(0, 255, 159, 0.1); width: 100%; margin-bottom: 0.5rem; position: relative;
        }

        .progress-fill {
            height: 100%; background: var(--primary-cyan); width: 35%; box-shadow: 0 0 10px var(--primary-cyan);
        }

        .player-controls {
            display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--primary-green);
        }

        .play-btn {
            color: var(--primary-cyan); cursor: pointer; font-size: 1.2rem;
        }

        .btn {
            display: inline-block; padding: 0.8rem 1.5rem; background: transparent; border: 2px solid var(--primary-cyan);
            color: var(--primary-cyan); text-decoration: none; text-transform: uppercase; font-size: 0.8rem;
            font-weight: 600; letter-spacing: 0.1em; transition: all 0.3s; cursor: pointer;
            font-family: 'Roboto Mono', monospace; width: 100%; text-align: center; margin-top: auto;
        }

        .btn:hover {
            background: var(--primary-cyan); color: var(--darker-bg); box-shadow: 0 0 20px var(--primary-cyan);
        }

        .footer {
            background: rgba(5, 8, 16, 0.95); border-top: 2px solid var(--primary-cyan); padding: 2rem;
            text-align: center; position: relative; z-index: 2;
        }

        .results-info {
            text-align: center; color: var(--primary-green); margin-bottom: 2rem; font-size: 0.9rem;
        }

        @media (max-width: 640px) {
            .page-title { font-size: 2.5rem; }
            .search-filter-section { grid-template-columns: 1fr; }
            .audio-grid { grid-template-columns: 1fr; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">DJ_iD01t</a>
            <ul class="nav-links">
                <li><a href="music.html">MUSIC</a></li>
                <li><a href="ebooks.html">EBOOKS</a></li>
                <li><a href="audiobooks.html" class="active">AUDIOBOOKS</a></li>
                <li><a href="index.html#about">ABOUT</a></li>
                <li><a href="index.html#contact">CONTACT</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <h1 class="page-title">AUDIO_ARCHIVE</h1>
        <div class="archive-stats">
            > 270 AUDIOBOOKS IDENTIFIED // GUILLAUME LESSARD • EL' NOX RAH • DJ iD01t // iD01t PRODUCTIONS
        </div>

        <div class="search-filter-section">
            <div class="search-box">
                <label for="searchInput">SEARCH_ARCHIVE</label>
                <input type="text" id="searchInput" placeholder="Search by title, author, or keyword...">
            </div>
            <div class="search-box">
                <label for="categoryFilter">GENRE</label>
                <select id="categoryFilter">
                    <option value="">All Genres</option>
                    <option value="Tech/Programming">Tech/Programming</option>
                    <option value="Music/DJ">Music/DJ</option>
                    <option value="Self-Help/Spiritual">Self-Help/Spiritual</option>
                    <option value="Fiction/Culture">Fiction/Culture</option>
                </select>
            </div>
            <div class="search-box">
                <label for="languageFilter">VOICE_LANG</label>
                <select id="languageFilter">
                    <option value="">All Languages</option>
                    <option value="English">English</option>
                    <option value="French">French</option>
                    <option value="German">German</option>
                    <option value="Spanish">Spanish</option>
                </select>
            </div>
        </div>

        <div class="results-info">
            <span id="resultCount">Showing 270 of 270 audiobooks</span>
        </div>

        <div class="audio-grid" id="audioGrid">
            <!-- Audiobooks will be dynamically inserted here -->
        </div>
    </main>

    <footer class="footer">
        <p>DJ iD01t // AUDIO_ARCHIVE // 2026 // iD01t PRODUCTIONS</p>
    </footer>

    <script>
        let allBooks = [];

        function renderBooks(booksToRender) {
            const grid = document.getElementById('audioGrid');
            grid.innerHTML = '';

            booksToRender.forEach(book => {
                const card = document.createElement('div');
                card.className = 'audio-card';
                card.innerHTML = `
                    <h3 class="audio-title">${book.title}</h3>
                    <p class="audio-author">by ${book.author}</p>
                    <div class="player-ui">
                        <div class="progress-bar"><div class="progress-fill"></div></div>
                        <div class="player-controls">
                            <span class="play-btn">▶</span>
                            <span>04:20 / 12:00</span>
                            <span>${book.language}</span>
                        </div>
                    </div>
                    <a href="https://id01t.store" class="btn">STREAM_PAYLOAD</a>
                `;
                grid.appendChild(card);
            });

            document.getElementById('resultCount').textContent = `Showing ${booksToRender.length} of ${allBooks.length} audiobooks`;
        }

        function filterBooks() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const language = document.getElementById('languageFilter').value;

            const filtered = allBooks.filter(book => {
                const matchesSearch = book.title.toLowerCase().includes(searchTerm) || book.author.toLowerCase().includes(searchTerm);
                const matchesCategory = !category || book.category === category;
                const matchesLanguage = !language || book.language === language;
                return matchesSearch && matchesCategory && matchesLanguage;
            });

            renderBooks(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', filterBooks);
        document.getElementById('categoryFilter').addEventListener('change', filterBooks);
        document.getElementById('languageFilter').addEventListener('change', filterBooks);

        fetch('structured_books_270.json')
            .then(r => r.json())
            .then(data => {
                allBooks = data;
                renderBooks(allBooks);
            });
    </script>
</body>
</html>
