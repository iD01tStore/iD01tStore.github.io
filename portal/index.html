<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto mt-10">
        <h1 class="text-3xl font-bold">Client Portal</h1>
        <div id="serviceModal" class="hidden">
            <input type="hidden" id="orderServiceId">
            <input type="hidden" id="orderServiceName">
            <p>Service: <span id="summaryService"></span></p>
            <p>Delivery Time: <span id="summaryDelivery"></span></p>
            <p>Total: <span id="summaryTotal"></span></p>
            <div id="carrierGroup" class="hidden">
                <label for="orderCarrier">Carrier</label>
                <input type="text" id="orderCarrier">
            </div>
            <label for="orderIMEI">IMEI</label>
            <input type="text" id="orderIMEI">
            <label for="orderNotes">Notes</label>
            <textarea id="orderNotes"></textarea>
            <div id="paypal-button-container" style="display: none;"></div>
            <div id="appPaymentFallback" class="hidden">
                <button onclick="proceedToAppPayment()">Pay with App</button>
            </div>
        </div>
    </div>
    <script src="./assets/js/app.js"></script>
</body>
</html>
