<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal - iTechMobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 8px;
            color: white;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background-color: #10b981;
        }
        .toast.warning {
            background-color: #f59e0b;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="toast" class="toast"></div>

    <div class="container mx-auto mt-10 p-4">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-extrabold text-gray-800">Client Services</h1>
            <p class="text-gray-600">Select a remote service for your Android device.</p>
        </header>

        <div id="service-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Services will be dynamically inserted here -->
        </div>
    </div>

    <!-- Order Modal -->
    <div id="serviceModal" class="fixed inset-0 bg-gray-800 bg-opacity-75 flex items-center justify-center hidden">
        <div class="bg-white rounded-lg shadow-2xl p-8 w-full max-w-lg">
            <h2 class="text-2xl font-bold mb-4">Place Your Order</h2>
            
            <div class="mb-4 border-b pb-4">
                <p class="text-lg font-semibold">Service: <span id="summaryService" class="text-indigo-600"></span></p>
                <p class="text-sm text-gray-500">Delivery: <span id="summaryDelivery"></span></p>
                <p class="text-xl font-bold mt-2">Total: <span id="summaryTotal" class="text-green-600"></span></p>
            </div>

            <input type="hidden" id="orderServiceId">
            <input type="hidden" id="orderServiceName">

            <div class="space-y-4">
                <div>
                    <label for="orderIMEI" class="block text-sm font-medium text-gray-700">Device IMEI (15 digits)</label>
                    <input type="text" id="orderIMEI" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" placeholder="Enter your device IMEI">
                </div>
                
                <div id="carrierGroup" class="hidden">
                    <label for="orderCarrier" class="block text-sm font-medium text-gray-700">Carrier (if applicable)</label>
                    <input type="text" id="orderCarrier" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" placeholder="e.g., T-Mobile, Verizon">
                </div>

                <div>
                    <label for="orderNotes" class="block text-sm font-medium text-gray-700">Notes (Optional)</label>
                    <textarea id="orderNotes" rows="2" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" placeholder="Any additional information..."></textarea>
                </div>
            </div>

            <div id="paypal-button-container" class="mt-6" style="display: none;">
                <!-- PayPal button would render here -->
            </div>

            <div id="appPaymentFallback" class="mt-6 hidden">
                <p class="text-center text-sm text-gray-600 mb-2">To complete your purchase, you will be directed to the iTechMobile app.</p>
                <button onclick="proceedToAppPayment()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all">
                    Pay Securely With iTechMobile App
                </button>
            </div>
            
            <button onclick="closeServiceModal()" class="w-full mt-2 text-center text-sm text-gray-500 hover:text-gray-700">Cancel</button>
        </div>
    </div>

    <script src="./assets/js/app.js"></script>
</body>
</html>
