<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - iTechMobile Client Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="./assets/css/portal.css">
</head>
<body id="profile-page" class="font-sans">

    <div class="portal-container">
        <header class="portal-header">
            <h1 class="text-2xl font-bold text-gray-900">iTechMobile Portal</h1>
            <nav class="portal-nav">
                <a href="./dashboard.html">Dashboard</a>
                <a href="./index.html">Services</a>
                <a href="./orders.html">My Orders</a>
                <a href="./profile.html" class="font-bold text-indigo-600">Profile</a>
                <button id="logout-btn" class="text-sm text-gray-500 hover:text-gray-700">Logout</button>
            </nav>
        </header>

        <main>
            <h2 class="text-3xl font-extrabold text-gray-800 mb-6">Your Profile</h2>

            <div class="portal-card">
                <p class="text-gray-600">This is a placeholder for your user profile. In a real application, you would be able to update your contact information and preferences here.</p>
                
                <div class="mt-6 space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Name</label>
                        <input type="text" value="John Doe" disabled class="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-100 sm:text-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Email</label>
                        <input type="email" value="customer@example.com" disabled class="mt-1 block w-full rounded-md border-gray-300 shadow-sm bg-gray-100 sm:text-sm">
                    </div>
                    <button class="bg-indigo-600 text-white font-bold py-2 px-4 rounded-lg shadow-md" disabled>Save Changes</button>
                </div>

            </div>
        </main>
    </div>

    <script src="./assets/js/auth.js"></script>
</body>
</html>
